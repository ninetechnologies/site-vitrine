<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Nine Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1A5FBF;
            --navy: #0D1B2A;
            --white: #FFFFFF;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--white);
            color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 480px; }
        .code {
            font-size: 8rem; font-weight: 700; line-height: 1;
            color: var(--blue); margin-bottom: 1rem;
        }
        .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        .subtitle {
            font-size: 1rem; font-weight: 400; color: #555;
            line-height: 1.6; margin-bottom: 2rem;
        }
        .btn {
            display: inline-block; background-color: var(--blue);
            color: var(--white); text-decoration: none;
            font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
            padding: 0.75rem 1.75rem; border-radius: 6px;
            transition: opacity 0.2s ease;
        }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1 class="title">Page introuvable</h1>
        <p class="subtitle">La page que vous recherchez n'existe pas ou a &eacute;t&eacute; d&eacute;plac&eacute;e.</p>
        <a href="/" class="btn">Retour &agrave; l'accueil</a>
    </div>
</body>
</html>
